# This tells GitHub: "Run my Python Accountant every night at midnight"
name: Daily_Billing_Automation

on:
  schedule:
    # This runs at 00:00 (midnight) every day
    - cron: '0 0 * * *'
  workflow_dispatch: # This adds a "Run" button so we can test it manually

jobs:
  run-billing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Billing Script
        run: python supabase/billing_engine.py